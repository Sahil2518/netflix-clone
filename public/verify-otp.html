<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix - Verify OTP</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-image: url("assets/img/bg.jpg");
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: black;
        }

        .signin-container {
            max-width: 450px;
            margin: auto;
            background-color: rgba(0, 0, 0, 0.75);
            padding: 60px 68px 40px;
            border-radius: 4px;
            color: white;
        }

        .form-input {
            width: 100%;
            background: #333;
            border-radius: 4px;
            border: 0;
            color: #fff;
            height: 50px;
            padding: 0 20px;
            margin-bottom: 16px;
            box-sizing: border-box;
        }

        .btn-submit {
            width: 100%;
            background-color: #e50914;
            color: white;
            font-weight: 700;
            border-radius: 4px;
            border: none;
            padding: 16px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="signin-container">
        <h1>Verify OTP</h1>
        <p style="margin-bottom: 20px; color: #737373;">Enter the 6-digit code and your new password.</p>
        <form id="verify-form">
            <input type="text" id="otp" placeholder="6-digit OTP" class="form-input" required maxlength="6">
            <input type="password" id="newPassword" placeholder="New Password" class="form-input" required
                minlength="6">
            <button type="submit" class="btn-submit">Reset Password</button>
        </form>
    </div>

    <script>
        document.getElementById('verify-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = localStorage.getItem('resetEmail');
            const otp = document.getElementById('otp').value;
            const newPassword = document.getElementById('newPassword').value;

            if (!email) {
                alert('Session expired. Please try again.');
                window.location.href = 'forgot-password.html';
                return;
            }

            const res = await fetch('/api/auth/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, otp, newPassword })
            });

            if (res.ok) {
                alert('Password reset successful! You can now sign in.');
                localStorage.removeItem('resetEmail');
                window.location.href = 'signin.html';
            } else {
                const data = await res.json();
                alert(data.error || 'Invalid OTP');
            }
        });
    </script>
</body>

</html>
