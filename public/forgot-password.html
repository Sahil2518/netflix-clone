<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix - Forgot Password</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-image: url("assets/img/bg.jpg");
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: black;
        }

        .signin-container {
            max-width: 450px;
            margin: auto;
            background-color: rgba(0, 0, 0, 0.75);
            padding: 60px 68px 40px;
            border-radius: 4px;
            color: white;
        }

        .form-input {
            width: 100%;
            background: #333;
            border-radius: 4px;
            border: 0;
            color: #fff;
            height: 50px;
            padding: 0 20px;
            margin-bottom: 16px;
            box-sizing: border-box;
        }

        .btn-submit {
            width: 100%;
            background-color: #e50914;
            color: white;
            font-weight: 700;
            border-radius: 4px;
            border: none;
            padding: 16px;
            cursor: pointer;
        }
    </style>
    <script src="config.js"></script>
</head>

<body>
    <nav>
        <div class="logo-container">
            <a href="index.html">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTjCBwdqb-ZQG1tCIopwWW63bzCjSNbMzRrng&s"
                    alt="Logo" style="height: 60px;">
            </a>
        </div>
    </nav>
    <div class="signin-container">
        <h1>Forgot Password</h1>
        <p style="margin-bottom: 20px; color: #737373;">Enter your email to receive a 6-digit OTP.</p>
        <form id="forgot-form">
            <input type="email" id="email" placeholder="Email" class="form-input" required>
            <button type="submit" class="btn-submit">Send OTP</button>
        </form>
    </div>

    <script>
        document.getElementById('forgot-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const res = await fetch(`${API_BASE_URL}/api/auth/forgot-password`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
            if (res.ok) {
                localStorage.setItem('resetEmail', email);
                alert('OTP sent! Check server console.');
                window.location.href = 'verify-otp.html';
            } else {
                const data = await res.json();
                alert(data.error || 'User not found');
            }
        });
    </script>
</body>

</html>
